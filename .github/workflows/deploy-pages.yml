name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths: [build/firepower.html]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages
        run: |
          mkdir -p _site
          cp build/firepower.html _site/index.html
          cp build/firepower.html _site/firepower.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
