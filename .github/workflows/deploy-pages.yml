name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - build/firepower.html
      - build/sprites/pokemon/menu/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages
        run: |
          mkdir -p _site/sprites/pokemon/menu
          cp build/firepower.html _site/index.html
          cp build/firepower.html _site/firepower.html
          cp -r build/sprites/pokemon/menu/* _site/sprites/pokemon/menu/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
