name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - index.html
      - build/*.html
      - build/sprites/pokemon/menu/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages
        run: |
          mkdir -p _site/build/sprites/pokemon/menu
          cp index.html _site/index.html
          for f in build/*.html; do
            cp "$f" "_site/$f"
          done
          if [ -d build/sprites/pokemon/menu ]; then
            cp -r build/sprites/pokemon/menu/* _site/build/sprites/pokemon/menu/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
